services:
  smartvision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartvision
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - smartvision_data:/app/pb_data
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  smartvision_data:
    driver: local
