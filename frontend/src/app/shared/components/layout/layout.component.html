<div class="dashboard-shell relative min-h-screen overflow-hidden">
  <header class="dashboard-topbar sticky top-0 z-20 px-4 py-3 md:px-8 md:py-4">
    <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3 md:gap-4">
        <a routerLink="/dashboard" class="brand-mark flex h-9 w-9 items-center justify-center bg-gradient-to-br from-slate-700 to-blue-600 text-white shadow-sm shadow-slate-900/20 md:h-10 md:w-10">
          <i class="pi pi-camera text-sm"></i>
        </a>
        <div class="hidden sm:block">
          <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-blue-700/90 md:text-xs">SmartVision</p>
          <a routerLink="/dashboard"><h1 class="text-lg font-black tracking-tight text-slate-900 md:text-2xl">Operational Dashboard</h1></a>
        </div>
      </div>

      <div class="flex items-center gap-2 md:ml-auto md:gap-3">
        <!-- Desktop navigation links -->
        <nav class="top-nav hidden md:flex gap-1.5 border border-slate-200/70 bg-white/85 p-1 shadow-sm backdrop-blur">
          <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-xl no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/dashboard" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
          <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-xl no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/cameras" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Cameras</a>
          <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-xl no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/rooms" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Rooms</a>
          <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-xl no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/vehicles" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Vehicles</a>
          <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-xl no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/users" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Users</a>
        </nav>

        <!-- Mobile nav menu button could go here -->
        
        <button
          type="button"
          pButton
          class="user-menu-trigger !rounded-full !border !border-slate-200/80 !bg-white/95 !px-2 !py-1.5"
          (click)="toggleUserMenu($event)"
          aria-label="Open user menu"
        >
          <div class="flex items-center gap-2">
            <p-avatar [label]="authService.userInitials" shape="circle" styleClass="!bg-slate-900 !text-white" />
            <i class="pi pi-angle-down text-xs text-slate-500"></i>
          </div>
        </button>

        <p-menu #userMenu [popup]="true" [model]="userMenuItems()" appendTo="body"></p-menu>
      </div>
    </div>
  </header>

  <!-- Mobile navigation -->
  <div class="mobile-top-nav md:hidden overflow-x-auto whitespace-nowrap px-4 py-2 border-b border-slate-200/80 bg-white z-10" aria-label="Mobile section navigation">
    <div class="flex gap-2 min-w-max rounded-xl border border-slate-200/70 bg-white/85 p-1 shadow-sm">
      <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-lg no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/dashboard" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
      <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-lg no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/cameras" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Cameras</a>
      <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-lg no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/rooms" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Rooms</a>
      <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-lg no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/vehicles" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Vehicles</a>
      <a class="top-nav-link p-button p-component p-button-text p-button-sm font-semibold rounded-lg no-underline text-slate-600 hover:bg-slate-100 hover:text-slate-900 px-3 py-2 transition-colors" routerLink="/users" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">Users</a>
    </div>
  </div>

  <div class="relative z-10 mx-auto max-w-7xl space-y-5 p-4 pb-safe md:space-y-6 md:p-8">
    <router-outlet></router-outlet>
  </div>
</div>
