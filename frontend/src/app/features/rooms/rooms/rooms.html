<div class="flex flex-col gap-4">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <h2 class="text-2xl font-bold text-slate-800">Rooms</h2>
    </div>
    <div class="flex items-center gap-2">
      <p-button
        label="Refresh"
        icon="pi pi-refresh"
        [loading]="loading()"
        styleClass="action-btn"
        [outlined]="true"
        severity="info"
        size="small"
        (onClick)="loadData()"
      />
      <p-button
        label="Add Group"
        icon="pi pi-folder-plus"
        [outlined]="true"
        severity="secondary"
        size="small"
        (onClick)="openNewRoomGroup()"
      />
      <p-button
        label="Add Room"
        icon="pi pi-plus"
        severity="primary"
        size="small"
        (onClick)="openNewRoom()"
      />
    </div>
  </div>

  <p-card styleClass="dashboard-card glass-surface p-0 shadow-sm overflow-hidden">
    <p-table
      #dt
      [value]="groupRows()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="8"
      [rowsPerPageOptions]="[10, 25, 50]"
      styleClass="dashboard-table p-datatable-sm"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th style="width: 110px">Type</th>
          <th>Notes</th>
          <th style="width: 120px">Rooms</th>
          <th style="width: 160px">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-group>
        <tr>
          <td>
            <div class="flex items-center gap-2">
              <p-button
                [icon]="isGroupExpanded(group) ? 'pi pi-chevron-down' : 'pi pi-chevron-right'"
                [text]="true"
                [rounded]="true"
                size="small"
                severity="secondary"
                (onClick)="toggleGroupRow(group)"
              />
              <span class="font-semibold text-slate-900">{{ group.name }}</span>
            </div>
          </td>
          <td>
            <span class="px-2 py-1 bg-indigo-50 text-indigo-700 rounded-md text-xs font-semibold border border-indigo-100">Group</span>
          </td>
          <td>
            <span class="text-sm text-slate-500 line-clamp-1 truncate max-w-[320px]">{{ group.notes || '-' }}</span>
          </td>
          <td>
            <span class="px-2 py-1 bg-slate-100 text-slate-700 rounded-md text-sm border border-slate-200">
              {{ getGroupRowCountLabel(group) }}
            </span>
          </td>
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-plus"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="success"
                (onClick)="openNewRoom(group.id === '__ungrouped__' ? '' : group.id)"
              />
              <p-button
                *ngIf="group.id !== '__ungrouped__'"
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="info"
                (onClick)="editRoomGroup(group)"
              />
              <p-button
                *ngIf="group.id !== '__ungrouped__'"
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="danger"
                (onClick)="deleteRoomGroupConfirm(group)"
              />
            </div>
          </td>
        </tr>

        <ng-container *ngIf="isGroupExpanded(group)">
          <tr *ngFor="let room of group.rooms" class="bg-slate-50/60">
            <td>
              <div class="flex items-center gap-2 pl-9">
                <i class="pi pi-angle-right text-slate-400"></i>
                <span class="font-medium text-slate-800">{{ room.number || '-' }} · {{ room.name || 'Unnamed room' }}</span>
              </div>
            </td>
            <td>
              <span class="px-2 py-1 bg-emerald-50 text-emerald-700 rounded-md text-xs font-semibold border border-emerald-100">Room</span>
            </td>
            <td>
              <span class="text-sm text-slate-500 line-clamp-1 truncate max-w-[320px]">{{ room.notes || room.description || '-' }}</span>
            </td>
            <td class="text-slate-400">-</td>
            <td>
              <div class="flex gap-2">
                <p-button
                  icon="pi pi-pencil"
                  [rounded]="true"
                  [text]="true"
                  size="small"
                  severity="info"
                  (onClick)="editRoom(room)"
                />
                <p-button
                  icon="pi pi-trash"
                  [rounded]="true"
                  [text]="true"
                  size="small"
                  severity="danger"
                  (onClick)="deleteRoomConfirm(room)"
                />
              </div>
            </td>
          </tr>

          <tr *ngIf="group.rooms.length === 0" class="bg-slate-50/60">
            <td colspan="5" class="!py-3 !pl-16 text-sm text-slate-500 italic">
              No rooms in this group yet.
            </td>
          </tr>
        </ng-container>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-8 text-slate-500">
            <i class="pi pi-th-large text-3xl mb-3 text-slate-300 block"></i>
            No room groups found.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<!-- Add/Edit Room Group Dialog -->
<p-dialog
  [(visible)]="groupDialogVisible"
  [header]="groupDialogMode === 'create' ? 'Add Room Group' : 'Edit Room Group'"
  [modal]="true"
  styleClass="w-full max-w-[500px]"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-4 py-4" *ngIf="groupFormState">
    <div class="flex flex-col gap-2">
      <label for="group_name" class="text-sm font-semibold text-slate-700">Group Name <span class="text-red-500">*</span></label>
      <input id="group_name" type="text" pInputText [(ngModel)]="groupFormState.name" placeholder="e.g. North Wing" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="group_notes" class="text-sm font-semibold text-slate-700">Notes</label>
      <textarea id="group_notes" pTextarea [(ngModel)]="groupFormState.notes" rows="3" placeholder="Optional notes..."></textarea>
    </div>
  </div>
  
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="hideRoomGroupDialog()" />
      <p-button label="Save" icon="pi pi-check" (onClick)="saveRoomGroup()" [loading]="savingGroup()" />
    </div>
  </ng-template>
</p-dialog>

<!-- Add/Edit Room Dialog -->
<p-dialog
  [(visible)]="roomDialogVisible"
  [header]="roomDialogMode === 'create' ? 'Add Room' : 'Edit Room'"
  [modal]="true"
  styleClass="w-full max-w-[500px]"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-4 py-4" *ngIf="roomFormState">
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <div class="flex flex-col gap-2">
        <label for="number" class="text-sm font-semibold text-slate-700">Room Number <span class="text-red-500">*</span></label>
        <input id="number" type="text" pInputText [(ngModel)]="roomFormState.number" placeholder="e.g. 101" />
      </div>

      <div class="flex flex-col gap-2">
        <label for="name" class="text-sm font-semibold text-slate-700">Room Name <span class="text-red-500">*</span></label>
        <input id="name" type="text" pInputText [(ngModel)]="roomFormState.name" placeholder="e.g. Room A" />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label for="room_group" class="text-sm font-semibold text-slate-700">Room Group</label>
      <p-select
        id="room_group"
        [options]="roomGroups()"
        [(ngModel)]="roomFormState.room_group"
        optionLabel="name"
        optionValue="id"
        placeholder="Select a group..."
        [showClear]="true"
        appendTo="body"
        styleClass="w-full"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label for="room_notes" class="text-sm font-semibold text-slate-700">Notes</label>
      <textarea id="room_notes" pTextarea [(ngModel)]="roomFormState.notes" rows="3" placeholder="Optional notes..."></textarea>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="hideRoomDialog()" />
      <p-button label="Save" icon="pi pi-check" (onClick)="saveRoom()" [loading]="savingRoom()" />
    </div>
  </ng-template>
</p-dialog>
