<div class="page-shell">
  <div class="page-header">
    <div class="flex items-center gap-3">
      <h2 class="page-title">Vehicles</h2>
    </div>
    <div class="page-actions">
      <p-button
        label="Refresh"
        icon="pi pi-refresh"
        [loading]="loading()"
        styleClass="action-btn"
        [outlined]="true"
        severity="info"
        size="small"
        (onClick)="loadVehicles()"
      />
      <p-button
        label="Add Vehicle"
        icon="pi pi-plus"
        severity="primary"
        size="small"
        (onClick)="openNewVehicle()"
      />
    </div>
  </div>

  <p-card styleClass="dashboard-card glass-surface p-0 shadow-sm">
    <div class="table-toolbar">
      <div class="table-search-shell">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          class="table-search-input"
          placeholder="Search vehicles freely..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
        />
      </div>
    </div>

    <p-table
      #dt
      [value]="filteredVehicles()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [paginatorDropdownAppendTo]="'body'"
      styleClass="dashboard-table p-datatable-sm"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('number')">
              Plate Number
              <i class="pi text-[11px]" [ngClass]="getSortIcon('number')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('country')">
              Country
              <i class="pi text-[11px]" [ngClass]="getSortIcon('country')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('owner')">
              Owner
              <i class="pi text-[11px]" [ngClass]="getSortIcon('owner')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('enabled')">
              Enabled
              <i class="pi text-[11px]" [ngClass]="getSortIcon('enabled')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('notes')">
              Notes
              <i class="pi text-[11px]" [ngClass]="getSortIcon('notes')"></i>
            </button>
          </th>
          <th style="width: 120px">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-vehicle>
        <tr>
          <td class="font-medium text-slate-900">{{ vehicle.number }}</td>
          <td>{{ vehicle.country || '-' }}</td>
          <td>
            <span class="text-sm text-slate-600">{{ vehicle.ownerLabel || '-' }}</span>
          </td>
          <td>
            <p-tag [value]="vehicle.enabled ? 'Yes' : 'No'" [severity]="vehicle.enabled ? 'success' : 'secondary'"></p-tag>
          </td>
          <td>
            <span class="text-sm text-slate-500 line-clamp-1 max-w-xs">{{ vehicle.notes || vehicle.note || '-' }}</span>
          </td>
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="info"
                (onClick)="editVehicle(vehicle)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="danger"
                (onClick)="deleteVehicleConfirm(vehicle)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center py-8 text-slate-500">
            <i class="pi pi-car text-3xl mb-3 text-slate-300 block"></i>
            No vehicles found.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<!-- Add/Edit Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="dialogMode === 'create' ? 'Add Vehicle' : 'Edit Vehicle'"
  [modal]="true"
  styleClass="w-full max-w-[500px]"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-4 py-4" *ngIf="formState">
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="number" class="text-sm font-semibold text-slate-700">Plate Number <span class="text-red-500">*</span></label>
        <input id="number" type="text" pInputText [(ngModel)]="formState.number" placeholder="XYZ 123" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="country" class="text-sm font-semibold text-slate-700">Country Code</label>
        <input id="country" type="text" pInputText [(ngModel)]="formState.country" placeholder="e.g. DE, IT" maxlength="3" />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label for="owner" class="text-sm font-semibold text-slate-700">Owner <span class="text-[--sv-text-muted] font-normal">(Person or Company)</span></label>
      <p-autoComplete
        id="owner"
        [(ngModel)]="formState.ownerRecord"
        [suggestions]="suggestedOwners()"
        (completeMethod)="searchOwners($event)"
        field="displayName"
        optionLabel="displayName"
        dataKey="id"
        placeholder="Search users..."
        [dropdown]="true"
        [completeOnFocus]="true"
        appendTo="body"
        styleClass="w-full"
        [fluid]="true"
      >
        <ng-template let-item pTemplate="item">{{ item.displayName }}</ng-template>
      </p-autoComplete>
    </div>
    
    <div class="flex flex-col gap-2">
      <label for="notes" class="text-sm font-semibold text-slate-700">Notes / Details</label>
      <textarea id="notes" pTextarea [(ngModel)]="formState.notes" rows="3" placeholder="Optional notes..."></textarea>
    </div>

    <div class="flex items-center gap-2 mt-1">
      <input type="checkbox" id="vehicle_enabled" [(ngModel)]="formState['enabled']" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-600" />
      <label for="vehicle_enabled" class="text-sm font-semibold text-slate-700">Enabled</label>
    </div>
  </div>
  
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="hideDialog()" />
      <p-button label="Save" icon="pi pi-check" (onClick)="saveVehicle()" [loading]="saving()" />
    </div>
  </ng-template>
</p-dialog>
