<div class="page-shell">
  <div class="page-header">
    <div class="flex items-center gap-3">
      <h2 class="page-title">Cameras</h2>
    </div>
    <div class="page-actions">
      <p-button
        label="Refresh"
        icon="pi pi-refresh"
        [loading]="loading()"
        styleClass="action-btn"
        [outlined]="true"
        severity="info"
        size="small"
        (onClick)="loadCameras()"
      />
      <p-button
        label="Add Camera"
        icon="pi pi-plus"
        severity="primary"
        size="small"
        (onClick)="openNewCamera()"
      />
    </div>
  </div>

  <p-card styleClass="dashboard-card glass-surface p-0 shadow-sm">
    <div class="table-toolbar">
      <div class="table-search-shell">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          class="table-search-input"
          placeholder="Search cameras freely..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
        />
      </div>
    </div>

    <p-table
      #dt
      [value]="filteredCameras()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [paginatorDropdownAppendTo]="'body'"
      styleClass="dashboard-table p-datatable-sm"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('name')">
              Name
              <i class="pi text-[11px]" [ngClass]="getSortIcon('name')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('camera_id')">
              Camera ID
              <i class="pi text-[11px]" [ngClass]="getSortIcon('camera_id')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('direction')">
              Direction
              <i class="pi text-[11px]" [ngClass]="getSortIcon('direction')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('metadata')">
              Metadata
              <i class="pi text-[11px]" [ngClass]="getSortIcon('metadata')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('enabled')">
              Enabled
              <i class="pi text-[11px]" [ngClass]="getSortIcon('enabled')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('notes')">
              Camera Details
              <i class="pi text-[11px]" [ngClass]="getSortIcon('notes')"></i>
            </button>
          </th>
          <th style="width: 120px">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-camera>
        <tr>
          <td class="font-medium text-slate-900">{{ camera.name }}</td>
          <td><span class="text-slate-600">{{ camera.camera_id || '-' }}</span></td>
          <td>
            <span class="text-sm font-semibold" [ngClass]="camera.direction === 'out' ? 'text-orange-600' : 'text-emerald-600'">
              {{ camera.direction === 'out' ? 'Out' : 'In' }}
            </span>
          </td>
          <td>
            <span class="text-xs text-slate-500 line-clamp-1 max-w-xs">{{ camera.metadataText || '-' }}</span>
          </td>
          <td>
            <p-tag [value]="camera.enabled ? 'Yes' : 'No'" [severity]="camera.enabled ? 'success' : 'secondary'"></p-tag>
          </td>
          <td>
            <span class="text-sm text-slate-500 line-clamp-1 max-w-xs">{{ camera.notes || camera.description || '-' }}</span>
          </td>
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="info"
                (onClick)="editCamera(camera)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="danger"
                (onClick)="deleteCameraConfirm(camera)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-center py-8 text-slate-500">
            <i class="pi pi-camera text-3xl mb-3 text-slate-300 block"></i>
            No cameras found. Add one to get started.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<!-- Add/Edit Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="dialogMode === 'create' ? 'Add Camera' : 'Edit Camera'"
  [modal]="true"
  styleClass="w-full max-w-[500px]"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-4 py-4" *ngIf="formState">
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <div class="flex flex-col gap-2">
        <label for="name" class="text-sm font-semibold text-slate-700">Camera Name <span class="text-red-500">*</span></label>
        <input id="name" type="text" pInputText [(ngModel)]="formState.name" placeholder="e.g. Main Gate Entry" />
      </div>

      <div class="flex flex-col gap-2">
        <label for="camera_id" class="text-sm font-semibold text-slate-700">Camera ID <span class="text-red-500">*</span></label>
        <input id="camera_id" type="text" pInputText [(ngModel)]="formState.camera_id" placeholder="e.g. cam-main-entry" />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label for="direction" class="text-sm font-semibold text-slate-700">Direction <span class="text-red-500">*</span></label>
      <p-select
        id="direction"
        [options]="directionOptions"
        [(ngModel)]="formState.direction"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
        styleClass="w-full"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label for="metadata" class="text-sm font-semibold text-slate-700">Metadata (JSON)</label>
      <textarea id="metadata" pTextarea [(ngModel)]="formState.metadataText" rows="4" placeholder='{"ip":"10.0.0.1","zone":"north-gate"}'></textarea>
    </div>

    <div class="flex flex-col gap-2">
      <label for="notes" class="text-sm font-semibold text-slate-700">Notes</label>
      <textarea id="notes" pTextarea [(ngModel)]="formState.notes" rows="3" placeholder="Optional details about location or purpose..."></textarea>
    </div>

    <div class="flex items-center gap-2 mt-1">
      <input type="checkbox" id="camera_enabled" [(ngModel)]="formState['enabled']" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-600" />
      <label for="camera_enabled" class="text-sm font-semibold text-slate-700">Enabled</label>
    </div>
  </div>
  
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="hideDialog()" />
      <p-button label="Save" icon="pi pi-check" (onClick)="saveCamera()" [loading]="saving()" />
    </div>
  </ng-template>
</p-dialog>
