<div class="page-shell">
  <div class="page-header">
    <div class="flex items-center gap-3">
      <h2 class="page-title">Users</h2>
    </div>
    <div class="page-actions">
      <p-button
        label="Refresh"
        icon="pi pi-refresh"
        [loading]="loading()"
        styleClass="action-btn"
        [outlined]="true"
        severity="info"
        size="small"
        (onClick)="loadUsers()"
      />
      <!-- Only admins or operators (if permitted by rules elsewhere to create "users") can see add btn. We'll show for everyone but error out if they cant. Ideally hide if not admin/operator making users. -->
      <p-button
        label="Add User"
        icon="pi pi-plus"
        severity="primary"
        size="small"
        (onClick)="openNewUser()"
      />
    </div>
  </div>

  <p-card styleClass="dashboard-card glass-surface p-0 shadow-sm">
    <div class="table-toolbar">
      <div class="table-search-shell">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          class="table-search-input"
          placeholder="Search users freely..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
        />
      </div>
    </div>

    <p-table
      #dt
      [value]="filteredUsers()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [paginatorDropdownAppendTo]="'body'"
      styleClass="dashboard-table p-datatable-sm"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('type')">
              Type
              <i class="pi text-[11px]" [ngClass]="getSortIcon('type')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('username')">
              Username
              <i class="pi text-[11px]" [ngClass]="getSortIcon('username')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('name')">
              Name
              <i class="pi text-[11px]" [ngClass]="getSortIcon('name')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('company')">
              Company Name
              <i class="pi text-[11px]" [ngClass]="getSortIcon('company')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('email')">
              Email
              <i class="pi text-[11px]" [ngClass]="getSortIcon('email')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('role')">
              Role
              <i class="pi text-[11px]" [ngClass]="getSortIcon('role')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('enabled')">
              Enabled
              <i class="pi text-[11px]" [ngClass]="getSortIcon('enabled')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('verified')">
              Verified
              <i class="pi text-[11px]" [ngClass]="getSortIcon('verified')"></i>
            </button>
          </th>
          <th>
            <button type="button" class="inline-flex items-center gap-1.5" (click)="toggleSort('notes')">
              Notes
              <i class="pi text-[11px]" [ngClass]="getSortIcon('notes')"></i>
            </button>
          </th>
          <th>Created</th>
          <th>Updated</th>
          <th style="width: 120px">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <p-tag [value]="getUserTypeLabel(user)" [severity]="user.user_type === 'company' ? 'info' : user.user_type === 'employee' ? 'warn' : 'contrast'"></p-tag>
          </td>
          <td><span class="text-slate-600">{{ user.username || '-' }}</span></td>
          <td class="font-medium text-slate-900">{{ getDisplayName(user) }}</td>
          <td><span class="text-slate-600">{{ user.name || '-' }}</span></td>
          <td><span class="text-slate-600">{{ user.email }}</span></td>
          <td>
            <p-tag [value]="user.role" [severity]="getRoleSeverity(user.role)"></p-tag>
          </td>
          <td>
            <p-tag [value]="user.enabled ? 'Yes' : 'No'" [severity]="user.enabled ? 'success' : 'secondary'"></p-tag>
          </td>
          <td>
            <i class="pi" [ngClass]="user.verified ? 'pi-check-circle text-green-500' : 'pi-times-circle text-red-400'"></i>
          </td>
          <td><span class="text-sm text-slate-500 line-clamp-1 max-w-[220px]">{{ user.notes || '-' }}</span></td>
          <td><span class="text-sm text-slate-600">{{ formatDateTime(user.created) }}</span></td>
          <td><span class="text-sm text-slate-600">{{ formatDateTime(user.updated) }}</span></td>
          <td>
            <div class="flex gap-2" *ngIf="canEdit(user)">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="info"
                (onClick)="editUser(user)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="danger"
                (onClick)="deleteUserConfirm(user)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="12" class="text-center py-8 text-slate-500">
            <i class="pi pi-users text-3xl mb-3 text-slate-300 block"></i>
            No users found.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<!-- Add/Edit Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="dialogMode === 'create' ? 'Add User' : 'Edit User'"
  [modal]="true"
  styleClass="w-full max-w-[500px]"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-4 py-4" *ngIf="formState">
    <div class="flex flex-col gap-2">
      <label for="user_type" class="text-sm font-semibold text-slate-700">User Type</label>
      <p-select
        id="user_type"
        [options]="userTypeOptions"
        [(ngModel)]="formState['user_type']"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
        styleClass="w-full"
        (onChange)="onUserTypeChange($event.value)"
      />
    </div>

    @if (formState['user_type'] !== 'company') {
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="first_name" class="text-sm font-semibold text-slate-700">First Name <span class="text-red-500">*</span></label>
        <input id="first_name" type="text" pInputText [(ngModel)]="formState.first_name" placeholder="John" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="last_name" class="text-sm font-semibold text-slate-700">Last Name</label>
        <input id="last_name" type="text" pInputText [(ngModel)]="formState.last_name" placeholder="Doe" />
      </div>
    </div>
    } @else {
      <div class="flex flex-col gap-2">
        <label for="company_name" class="text-sm font-semibold text-slate-700">Company Name <span class="text-red-500">*</span></label>
        <input id="company_name" type="text" pInputText [(ngModel)]="formState['name']" placeholder="Company Ltd" />
      </div>
    }

    <div class="flex flex-col gap-2">
      <label for="username" class="text-sm font-semibold text-slate-700">Username</label>
      <input id="username" type="text" pInputText [(ngModel)]="formState['username']" placeholder="Optional username" />
    </div>
    
    <div class="flex flex-col gap-2">
      <label for="email" class="text-sm font-semibold text-slate-700">Email <span class="text-red-500">*</span></label>
      <input id="email" type="email" pInputText [(ngModel)]="formState.email" placeholder="john.doe@example.com" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="role" class="text-sm font-semibold text-slate-700">Role</label>
      <!-- Only Admin can give Admin/Operator roles -->
      <p-select 
        id="role" 
        [options]="roleOptions" 
        [(ngModel)]="formState.role" 
        [disabled]="!isAdmin()" 
        optionLabel="label" 
        optionValue="value" 
        appendTo="body"
        styleClass="w-full"
      />
    </div>

    <div class="flex items-center gap-2 mt-2">
      <input type="checkbox" id="enabled" [(ngModel)]="formState['enabled']" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-600" />
      <label for="enabled" class="text-sm font-semibold text-slate-700">Enabled</label>
    </div>

    <div class="flex flex-col gap-2">
      <label for="user_notes" class="text-sm font-semibold text-slate-700">Notes</label>
      <textarea id="user_notes" pTextarea [(ngModel)]="formState['notes']" rows="3" placeholder="Optional notes..."></textarea>
    </div>
  </div>
  
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="hideDialog()" />
      <p-button label="Save" icon="pi pi-check" (onClick)="saveUser()" [loading]="saving()" />
    </div>
  </ng-template>
</p-dialog>
