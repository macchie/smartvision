<div class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto bg-[var(--sv-bg)] p-4 safe-top safe-bottom md:p-6 text-[var(--sv-text)]">
  <div class="glass relative w-full max-w-[420px] rounded-[var(--sv-radius-lg)] p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-[var(--sv-border)] bg-[var(--sv-surface-strong)] animate-fade-in-up">
    <div class="mb-2 flex items-center justify-center gap-3" aria-hidden="true">
      <div class="flex h-12 w-12 items-center justify-center rounded-[var(--sv-radius-lg)] bg-[var(--sv-text)] text-white shadow-sm">
        <lucide-icon [img]="Camera" class="h-6 w-6"></lucide-icon>
      </div>
      <span class="text-[24px] font-bold tracking-tight text-[var(--sv-text)]">SmartVision</span>
    </div>
    <p class="mb-8 text-center text-sm font-medium text-[var(--sv-text-muted)]">Access Control Console</p>

    @if (authError()) {
      <div role="alert" aria-live="assertive"
        class="mb-6 flex items-center gap-2 rounded-[var(--sv-radius-lg)] border border-red-500/20 bg-red-50 px-4 py-3 text-xs font-medium text-red-600 animate-fade-in">
        <lucide-icon [img]="AlertCircle" class="w-4 h-4 shrink-0" aria-hidden="true"></lucide-icon>
        <span>{{ authError() }}</span>
      </div>
    }

    <form (ngSubmit)="auth()" [attr.aria-label]="authMode() === 'login' ? 'Sign in form' : 'Create account form'" novalidate class="space-y-4">
      @if (authMode() === 'register') {
        <div class="grid grid-cols-2 gap-4 animate-fade-in">
          <div class="space-y-2">
            <label for="auth-first-name" class="ml-1 block text-xs font-semibold text-[var(--sv-text-muted)]">First Name</label>
            <input id="auth-first-name" type="text" [(ngModel)]="form.firstName" name="firstName"
              placeholder="Jane" autocomplete="given-name" required
              class="w-full rounded-[var(--sv-radius-md)] border border-[var(--sv-border)] bg-[var(--sv-bg)] px-4 py-3.5 text-sm text-[var(--sv-text)] outline-none transition-all placeholder:text-gray-400 focus:border-[var(--sv-accent)] focus:bg-[var(--sv-surface-strong)] focus:ring-4 focus:ring-[var(--sv-accent-soft)]" />
          </div>
          <div class="space-y-2">
            <label for="auth-last-name" class="ml-1 block text-xs font-semibold text-[var(--sv-text-muted)]">Last Name</label>
            <input id="auth-last-name" type="text" [(ngModel)]="form.lastName" name="lastName"
              placeholder="Doe" autocomplete="family-name" required
              class="w-full rounded-[var(--sv-radius-md)] border border-[var(--sv-border)] bg-[var(--sv-bg)] px-4 py-3.5 text-sm text-[var(--sv-text)] outline-none transition-all placeholder:text-gray-400 focus:border-[var(--sv-accent)] focus:bg-[var(--sv-surface-strong)] focus:ring-4 focus:ring-[var(--sv-accent-soft)]" />
          </div>
        </div>
      }

        <div class="space-y-2">
          <label for="auth-email" class="ml-1 block text-xs font-semibold text-[var(--sv-text-muted)]">Email</label>
          <input id="auth-email" type="email" [(ngModel)]="form.email" name="email"
            placeholder="you@example.com" autocomplete="email" inputmode="email" required
            class="w-full rounded-[var(--sv-radius-md)] border border-[var(--sv-border)] bg-[var(--sv-bg)] px-4 py-3.5 text-sm text-[var(--sv-text)] outline-none transition-all placeholder:text-gray-400 focus:border-[var(--sv-accent)] focus:bg-[var(--sv-surface-strong)] focus:ring-4 focus:ring-[var(--sv-accent-soft)]" />
        </div>

        <div class="space-y-2">
          <label for="auth-password" class="ml-1 block text-xs font-semibold text-[var(--sv-text-muted)]">Password</label>
          <input id="auth-password" type="password" [(ngModel)]="form.pass" name="pass"
            [placeholder]="authMode() === 'register' ? 'Min. 8 characters' : '••••••••'"
            [attr.autocomplete]="authMode() === 'register' ? 'new-password' : 'current-password'"
            [attr.minlength]="authMode() === 'register' ? 8 : null"
            required
            class="w-full rounded-[var(--sv-radius-md)] border border-[var(--sv-border)] bg-[var(--sv-bg)] px-4 py-3.5 text-sm text-[var(--sv-text)] outline-none transition-all placeholder:text-gray-400 focus:border-[var(--sv-accent)] focus:bg-[var(--sv-surface-strong)] focus:ring-4 focus:ring-[var(--sv-accent-soft)]" />
        </div>

        @if (authMode() === 'register') {
          <div class="space-y-2 animate-fade-in">
            <label for="auth-password-confirm" class="ml-1 block text-xs font-semibold text-[var(--sv-text-muted)]">Confirm Password</label>
            <input id="auth-password-confirm" type="password" [(ngModel)]="form.passConfirm" name="passConfirm"
              placeholder="Re-enter password" autocomplete="new-password" required minlength="8"
              class="w-full rounded-[var(--sv-radius-md)] border border-[var(--sv-border)] bg-[var(--sv-bg)] px-4 py-3.5 text-sm text-[var(--sv-text)] outline-none transition-all placeholder:text-gray-400 focus:border-[var(--sv-accent)] focus:bg-[var(--sv-surface-strong)] focus:ring-4 focus:ring-[var(--sv-accent-soft)]" />
          </div>
        }

        <button type="submit" [disabled]="loading()" [attr.aria-busy]="loading()"
          [attr.aria-label]="loading() ? 'Please wait…' : (authMode() === 'login' ? 'Sign in' : 'Create account')"
          class="mt-4 w-full rounded-[var(--sv-radius-md)] bg-[var(--sv-accent)] py-3.5 font-semibold text-white transition-all active:scale-[0.98] shadow-sm hover:bg-blue-600 disabled:opacity-50">
          @if (!loading()) {
            <span>{{ authMode() === 'login' ? 'Sign In' : 'Create Account' }}</span>
          } @else {
            <span class="flex items-center justify-center gap-2">
              <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" aria-hidden="true"></span>
              <span class="sr-only">Loading…</span>
            </span>
          }
        </button>

        @if (authMode() === 'register') {
          <p class="mt-4 px-4 text-center text-xs leading-relaxed text-[var(--sv-text-muted)]">
            Your account will be reviewed by an administrator before full access is granted.
          </p>
        }
    </form>

    <div class="mt-8 pt-6 text-center">
      <button type="button" (click)="toggleAuthMode()" class="text-xs font-medium text-[var(--sv-accent)] transition-colors hover:text-blue-700">
        {{ authMode() === 'login' ? "Don't have an account? Register" : 'Already have an account? Sign in' }}
      </button>
    </div>
  </div>
</div>
