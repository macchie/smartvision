<div class="fixed inset-0 z-50 flex items-center justify-center auth-bg p-5 safe-top safe-bottom">
  <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl animate-float" aria-hidden="true"></div>
  <div class="absolute bottom-1/3 right-1/4 w-96 h-96 bg-indigo-500/8 rounded-full blur-3xl animate-float" style="animation-delay: -3s;" aria-hidden="true"></div>

  <div class="glass p-8 rounded-3xl shadow-2xl shadow-black/20 w-full max-w-[400px] border border-white/20 animate-fade-in-up relative">
    <div class="flex items-center justify-center gap-3 mb-1" aria-hidden="true">
      <div class="w-11 h-11 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-600/30 rotate-[-3deg]">
        <lucide-icon [img]="Zap" class="w-7 h-7"></lucide-icon>
      </div>
      <span class="font-black text-[26px] tracking-tighter bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">SMARTVISION</span>
    </div>
    <p class="text-gray-400 text-[13px] text-center mb-8 font-medium">Access Control Console</p>

    @if (authError()) {
      <div role="alert" aria-live="assertive"
        class="bg-red-50 border border-red-100 text-red-600 text-xs font-semibold px-4 py-3 rounded-xl mb-5 flex items-center gap-2 animate-fade-in">
        <lucide-icon [img]="AlertCircle" class="w-3.5 h-3.5 shrink-0" aria-hidden="true"></lucide-icon>
        <span>{{ authError() }}</span>
      </div>
    }

    <form (ngSubmit)="auth()" [attr.aria-label]="authMode() === 'login' ? 'Sign in form' : 'Create account form'" novalidate class="space-y-4">
      @if (authMode() === 'register') {
        <div class="grid grid-cols-2 gap-3 animate-fade-in">
          <div class="space-y-1.5">
            <label for="auth-first-name" class="text-[11px] font-semibold text-gray-500 ml-0.5 block">First Name</label>
            <input id="auth-first-name" type="text" [(ngModel)]="form.firstName" name="firstName"
              placeholder="Jane" autocomplete="given-name" required
              class="w-full px-4 py-3 bg-gray-50/80 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all text-sm placeholder:text-gray-300" />
          </div>
          <div class="space-y-1.5">
            <label for="auth-last-name" class="text-[11px] font-semibold text-gray-500 ml-0.5 block">Last Name</label>
            <input id="auth-last-name" type="text" [(ngModel)]="form.lastName" name="lastName"
              placeholder="Doe" autocomplete="family-name" required
              class="w-full px-4 py-3 bg-gray-50/80 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all text-sm placeholder:text-gray-300" />
          </div>
        </div>
      }

        <div class="space-y-1.5">
          <label for="auth-email" class="text-[11px] font-semibold text-gray-500 ml-0.5 block">Email</label>
          <input id="auth-email" type="email" [(ngModel)]="form.email" name="email"
            placeholder="you@example.com" autocomplete="email" inputmode="email" required
            class="w-full px-4 py-3 bg-gray-50/80 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all text-sm placeholder:text-gray-300" />
        </div>

        <div class="space-y-1.5">
          <label for="auth-password" class="text-[11px] font-semibold text-gray-500 ml-0.5 block">Password</label>
          <input id="auth-password" type="password" [(ngModel)]="form.pass" name="pass"
            [placeholder]="authMode() === 'register' ? 'Min. 8 characters' : '••••••••'"
            [attr.autocomplete]="authMode() === 'register' ? 'new-password' : 'current-password'"
            [attr.minlength]="authMode() === 'register' ? 8 : null"
            required
            class="w-full px-4 py-3 bg-gray-50/80 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all text-sm placeholder:text-gray-300" />
        </div>

        @if (authMode() === 'register') {
          <div class="space-y-1.5 animate-fade-in">
            <label for="auth-password-confirm" class="text-[11px] font-semibold text-gray-500 ml-0.5 block">Confirm Password</label>
            <input id="auth-password-confirm" type="password" [(ngModel)]="form.passConfirm" name="passConfirm"
              placeholder="Re-enter password" autocomplete="new-password" required minlength="8"
              class="w-full px-4 py-3 bg-gray-50/80 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all text-sm placeholder:text-gray-300" />
          </div>
        }

        <button type="submit" [disabled]="loading()" [attr.aria-busy]="loading()"
          [attr.aria-label]="loading() ? 'Please wait…' : (authMode() === 'login' ? 'Sign in' : 'Create account')"
          class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 rounded-xl hover:from-blue-700 hover:to-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-600/25 disabled:opacity-50 mt-1">
          @if (!loading()) {
            <span>{{ authMode() === 'login' ? 'Sign In' : 'Create Account' }}</span>
          } @else {
            <span class="flex items-center justify-center gap-2">
              <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" aria-hidden="true"></span>
              <span class="sr-only">Loading…</span>
            </span>
          }
        </button>

        @if (authMode() === 'register') {
          <p class="text-[10px] text-gray-400 mt-4 text-center px-4 leading-relaxed">
            Your account will be reviewed by an administrator before full access is granted.
          </p>
        }
    </form>

    <div class="mt-6 text-center">
      <button type="button" (click)="toggleAuthMode()" class="text-xs text-gray-400 hover:text-blue-600 transition-colors font-medium">
        {{ authMode() === 'login' ? "Don't have an account? Register" : 'Already have an account? Sign in' }}
      </button>
    </div>
  </div>
</div>
