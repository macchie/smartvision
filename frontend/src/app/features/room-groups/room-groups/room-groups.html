<div class="page-shell">
  <div class="page-header">
    <div class="flex items-center gap-3">
      <h2 class="page-title">Room Groups</h2>
    </div>
    <div class="page-actions">
      <p-button
        label="Refresh"
        icon="pi pi-refresh"
        [loading]="loading()"
        styleClass="action-btn"
        [outlined]="true"
        severity="info"
        size="small"
        (onClick)="loadRoomGroups()"
      />
      <p-button
        label="Add Room Group"
        icon="pi pi-plus"
        severity="primary"
        size="small"
        (onClick)="openNewRoomGroup()"
      />
    </div>
  </div>

  <p-card styleClass="dashboard-card glass-surface p-0 shadow-sm">
    <p-table
      #dt
      [value]="roomGroups()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [paginatorDropdownAppendTo]="'body'"
      styleClass="dashboard-table p-datatable-sm"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Group Name</th>
          <th>Description</th>
          <th>Created</th>
          <th>Updated</th>
          <th style="width: 120px">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-group>
        <tr>
          <td class="font-medium text-slate-900">{{ group.name }}</td>
          <td>
            <span class="text-sm text-slate-500 line-clamp-2">{{ group.notes || group.description || '-' }}</span>
          </td>
          <td><span class="text-sm text-slate-600">{{ formatDateTime(group.created) }}</span></td>
          <td><span class="text-sm text-slate-600">{{ formatDateTime(group.updated) }}</span></td>
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="info"
                (onClick)="editRoomGroup(group)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                size="small"
                severity="danger"
                (onClick)="deleteRoomGroupConfirm(group)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-8 text-slate-500">
            <i class="pi pi-th-large text-3xl mb-3 text-slate-300 block"></i>
            No room groups found.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<!-- Add/Edit Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="dialogMode === 'create' ? 'Add Room Group' : 'Edit Room Group'"
  [modal]="true"
  styleClass="w-full max-w-[500px]"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-4 py-4" *ngIf="formState">
    <div class="flex flex-col gap-2">
      <label for="name" class="text-sm font-semibold text-slate-700">Name <span class="text-red-500">*</span></label>
      <input id="name" type="text" pInputText [(ngModel)]="formState.name" placeholder="e.g. VIP Rooms" />
    </div>
    
    <div class="flex flex-col gap-2">
      <label for="notes" class="text-sm font-semibold text-slate-700">Notes</label>
      <textarea id="notes" pTextarea [(ngModel)]="formState.notes" rows="3" placeholder="Optional notes..."></textarea>
    </div>
  </div>
  
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="hideDialog()" />
      <p-button label="Save" icon="pi pi-check" (onClick)="saveRoomGroup()" [loading]="saving()" />
    </div>
  </ng-template>
</p-dialog>
